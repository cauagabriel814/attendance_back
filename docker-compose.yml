# ============================================================
# docker-compose.yml — Attendance Backend
# Serviços: postgres, redis, migration, api
# Padrão: migration roda e sai; api depende dela
# Portas NÃO expostas — EasyPanel gerencia via proxy reverso
# ============================================================
services:

  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
      POSTGRES_DB: attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U attendance_user -d attendance_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Migration — roda prisma migrate deploy e sai ───────────────────────────
  migration:
    build: .
    command: sh -c "npx prisma migrate deploy"
    environment:
      DATABASE_URL: postgresql://attendance_user:attendance_pass@postgres:5432/attendance_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ─── NestJS API ─────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: attendance_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://attendance_user:attendance_pass@postgres:5432/attendance_db?schema=public
    ports:
      - '3000'
    depends_on:
      - migration
      - redis
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  postgres_data:
