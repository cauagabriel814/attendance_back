version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: attendance_user
      POSTGRES_PASSWORD: attendance_pass
      POSTGRES_DB: attendance_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U attendance_user -d attendance_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (refresh token store / cron locks) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: attendance_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ───────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: attendance_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://attendance_user:attendance_pass@postgres:5432/attendance_db?schema=public
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
